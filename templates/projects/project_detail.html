{% extends 'base.html' %}

{% block content %}

<h1 class="mb-3">
    {{ project.name }}
</h1>

<p class="mb-4">
    {{ project.description }}
</p>

<div class="card shadow-sm p-4">

    <h4 class="mb-3">
        Team Members
    </h4>

    <ul>

        {% for member in project.members.all %}

            <li>

                {{ member.username }}
                ({{ member.role }})

            </li>

        {% endfor %}

    </ul>

</div>

{% endblock %}
